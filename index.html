<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Party — A Faction-First TTRPG</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="The Party: a genre-agnostic, faction-first tabletop roleplaying game.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #b03a2e;
    }
    .sidebar-nav li ul { font-size: 14px; }
    .markdown-section table { display: table; width: 100%; }
    .app-name-link { font-weight: 700; }
    .cover.show { background: linear-gradient(to bottom right, #2c3e50, #b03a2e) !important; }
    .cover.show h1, .cover.show h1 a, .cover.show h1 span, .cover.show blockquote, .cover.show p, .cover.show li { color: #f8f5f0 !important; }
    .cover.show h1 small { color: rgba(248, 245, 240, 0.65) !important; }
    .cover-main > p:last-child a { border-color: #f8f5f0 !important; color: #f8f5f0 !important; background: transparent !important; }
    .cover-main > p:last-child a:last-child { background: #f8f5f0 !important; color: #b03a2e !important; }
  </style>
</head>
<body>
  <div id="app">Loading The Party…</div>
  <script>
    window.$docsify = {
      name: 'The Party',
      repo: 'https://github.com/ethanbudge/TTRPG',
      loadSidebar: true,
      coverpage: true,
      onlyCover: false,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: 'Search the rules…',
        noData: 'No results.',
        depth: 3
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
